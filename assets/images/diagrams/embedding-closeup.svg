<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 620" width="100%" style="max-width:640px; font-family: Inter, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="manifold2" cx="0.5" cy="0.4" r="0.45">
      <stop offset="0%" stop-color="#3B8BD4" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#2563EB" stop-opacity="0.20"/>
      <stop offset="80%" stop-color="#1D4ED8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="620" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="320" y="30" fill="#94A3B8" font-size="14" font-weight="700" text-anchor="middle">EMBEDDING INTERFACE — Skill Space Close-Up</text>

  <!-- Manifold region -->
  <ellipse cx="320" cy="230" rx="270" ry="140" fill="url(#manifold2)" stroke="#3B8BD4" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="320" y="225" fill="#3B8BD4" font-size="12" font-weight="600" text-anchor="middle">Skill Embedding Space (R^128)</text>

  <!-- Skill regions within manifold -->
  <!-- walk (green) -->
  <circle cx="200" cy="180" r="22" fill="#22C55E" fill-opacity="0.2" stroke="#22C55E" stroke-width="1.5"/>
  <text x="200" y="184" fill="#22C55E" font-size="11" font-weight="600" text-anchor="middle">walk</text>

  <!-- turn (blue) -->
  <circle cx="300" cy="145" r="18" fill="#3B8BD4" fill-opacity="0.2" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="300" y="149" fill="#3B8BD4" font-size="11" font-weight="600" text-anchor="middle">turn</text>

  <!-- reach (orange) -->
  <circle cx="420" cy="200" r="26" fill="#F97316" fill-opacity="0.2" stroke="#F97316" stroke-width="1.5"/>
  <text x="420" y="204" fill="#F97316" font-size="11" font-weight="600" text-anchor="middle">reach</text>

  <!-- grasp (red) -->
  <circle cx="380" cy="280" r="20" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="380" y="284" fill="#EF4444" font-size="11" font-weight="600" text-anchor="middle">grasp</text>

  <!-- crouch (purple) -->
  <circle cx="250" cy="290" r="18" fill="#A855F7" fill-opacity="0.2" stroke="#A855F7" stroke-width="1.5"/>
  <text x="250" y="294" fill="#A855F7" font-size="11" font-weight="600" text-anchor="middle">crouch</text>

  <!-- Composition: walk + turn blend -->
  <path d="M210 190 Q250 160 290 155" stroke="#38BDF8" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <circle cx="248" cy="170" r="14" fill="#38BDF8" fill-opacity="0.25" stroke="#38BDF8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="248" y="174" fill="#38BDF8" font-size="9" font-weight="600" text-anchor="middle">walk+turn</text>

  <!-- reach + grasp composition arrow -->
  <path d="M405 220 Q400 250 392 265" stroke="#F97316" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <circle cx="397" cy="245" r="12" fill="#F97316" fill-opacity="0.2" stroke="#F97316" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="397" y="248" fill="#F97316" font-size="9" font-weight="600" text-anchor="middle">reach+grasp</text>

  <!-- VLA projection arrow -->
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#38BDF8"/></marker></defs>
  <text x="320" y="55" fill="#64748B" font-size="11" text-anchor="middle">VLA selects goal position in skill space</text>
  <path d="M320 65 L320 140" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <rect x="280" y="72" width="80" height="20" rx="4" fill="#1E293B" stroke="#38BDF8" stroke-width="0.8"/>
  <text x="320" y="86" fill="#38BDF8" font-size="10" font-weight="600" text-anchor="middle">z_g from VLA</text>

  <!-- ===== DECODER CALLOUTS (below manifold) ===== -->

  <!-- Embodiment barrier line -->
  <line x1="40" y1="370" x2="600" y2="370" stroke="#F97316" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="320" y="388" fill="#F97316" font-size="10" font-weight="600" text-anchor="middle">embodiment barrier</text>

  <!-- Same z_s → different kinematics -->
  <text x="320" y="408" fill="#94A3B8" font-size="10" text-anchor="middle">same z_s = "reach" — different kinematics</text>

  <!-- G1 skeleton callout -->
  <rect x="40" y="420" width="260" height="90" rx="8" fill="#1E293B" stroke="#F97316" stroke-width="0.8"/>
  <text x="170" y="443" fill="#F97316" font-size="12" font-weight="700" text-anchor="middle">Unitree G1</text>

  <!-- Simple stick figure for G1 -->
  <circle cx="140" cy="468" r="6" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="140" y1="474" x2="140" y2="496" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="140" y1="478" x2="120" y2="462" stroke="#F97316" stroke-width="1.2"/>
  <line x1="140" y1="478" x2="160" y2="460" stroke="#F97316" stroke-width="1.2"/>
  <line x1="140" y1="496" x2="125" y2="505" stroke="#94A3B8" stroke-width="1.2"/>
  <line x1="140" y1="496" x2="155" y2="505" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="140" y="515" fill="#64748B" font-size="9" text-anchor="middle">arm angles: 15°/40°</text>

  <text x="230" y="465" fill="#94A3B8" font-size="10">23 DoF</text>
  <text x="230" y="482" fill="#64748B" font-size="9">torso lean: 8°</text>
  <text x="230" y="497" fill="#64748B" font-size="9">leg pose: extended</text>

  <!-- GR1-T2 skeleton callout -->
  <rect x="340" y="420" width="260" height="90" rx="8" fill="#1E293B" stroke="#F97316" stroke-width="0.8"/>
  <text x="470" y="443" fill="#F97316" font-size="12" font-weight="700" text-anchor="middle">Fourier GR1-T2</text>

  <!-- Simple stick figure for GR1-T2 -->
  <circle cx="430" cy="468" r="6" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="430" y1="474" x2="430" y2="496" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="430" y1="478" x2="410" y2="458" stroke="#F97316" stroke-width="1.2"/>
  <line x1="430" y1="478" x2="450" y2="460" stroke="#F97316" stroke-width="1.2"/>
  <line x1="430" y1="496" x2="415" y2="505" stroke="#94A3B8" stroke-width="1.2"/>
  <line x1="430" y1="496" x2="445" y2="505" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="430" y="515" fill="#64748B" font-size="9" text-anchor="middle">arm angles: 22°/55°</text>

  <text x="520" y="465" fill="#94A3B8" font-size="10">19 DoF</text>
  <text x="520" y="482" fill="#64748B" font-size="9">torso lean: 2°</text>
  <text x="520" y="497" fill="#64748B" font-size="9">leg pose: crouched</text>

  <!-- Arrows from reach to both skeletons -->
  <path d="M420 226 L420 260 L170 260 L170 418" stroke="#F97316" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowOrange2)"/>
  <path d="M420 226 L420 260 L470 260 L470 418" stroke="#F97316" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowOrange2)"/>

  <defs><marker id="arrowOrange2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#F97316"/></marker></defs>

  <!-- Composition example: walk+turn → single movement -->
  <rect x="140" y="540" width="360" height="60" rx="6" fill="#1E293B" stroke="#38BDF8" stroke-width="0.8"/>
  <text x="320" y="560" fill="#38BDF8" font-size="11" font-weight="700" text-anchor="middle">Skill Composition: walk + turn = walk a curve</text>

  <!-- Mini stick figure walking curve -->
  <circle cx="200" cy="585" r="4" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <line x1="200" y1="589" x2="200" y2="596" stroke="#38BDF8" stroke-width="1"/>
  <line x1="200" y1="591" x2="195" y2="586" stroke="#38BDF8" stroke-width="0.8"/>
  <line x1="200" y1="591" x2="206" y2="587" stroke="#38BDF8" stroke-width="0.8"/>

  <circle cx="260" cy="593" r="4" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <line x1="260" y1="597" x2="260" y2="604" stroke="#38BDF8" stroke-width="1"/>
  <line x1="260" y1="599" x2="255" y2="594" stroke="#38BDF8" stroke-width="0.8"/>
  <line x1="260" y1="599" x2="266" y2="595" stroke="#38BDF8" stroke-width="0.8"/>

  <circle cx="320" cy="595" r="4" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <line x1="320" y1="599" x2="320" y2="606" stroke="#38BDF8" stroke-width="1"/>
  <line x1="320" y1="601" x2="315" y2="596" stroke="#38BDF8" stroke-width="0.8"/>
  <line x1="320" y1="601" x2="326" y2="597" stroke="#38BDF8" stroke-width="0.8"/>

  <circle cx="380" cy="589" r="4" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <line x1="380" y1="593" x2="380" y2="600" stroke="#38BDF8" stroke-width="1"/>
  <line x1="380" y1="595" x2="375" y2="590" stroke="#38BDF8" stroke-width="0.8"/>
  <line x1="380" y1="595" x2="386" y2="591" stroke="#38BDF8" stroke-width="0.8"/>

  <circle cx="430" cy="580" r="4" fill="none" stroke="#38BDF8" stroke-width="1"/>
  <line x1="430" y1="584" x2="430" y2="591" stroke="#38BDF8" stroke-width="1"/>
  <line x1="430" y1="586" x2="425" y2="581" stroke="#38BDF8" stroke-width="0.8"/>
  <line x1="430" y1="586" x2="436" y2="582" stroke="#38BDF8" stroke-width="0.8"/>

  <!-- curved path -->
  <path d="M200 578 Q320 595 430 570" stroke="#38BDF8" stroke-width="0.8" stroke-dasharray="4,3" fill="none"/>
</svg>
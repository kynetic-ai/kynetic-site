<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="100%" style="max-width:880px; font-family: Inter, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="monoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="directGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="kyneticGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B8BD4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <rect width="880" height="520" rx="12" fill="url(#bg3)"/>

  <text x="440" y="28" fill="#94A3B8" font-size="14" font-weight="700" text-anchor="middle">ARCHITECTURE COMPARISON</text>

  <!-- ===== COLUMN 1: Monolithic VLA ===== -->
  <rect x="20" y="45" width="270" height="255" rx="8" fill="url(#monoGrad)" stroke="#64748B" stroke-width="1"/>
  <text x="155" y="70" fill="#64748B" font-size="13" font-weight="700" text-anchor="middle">Monolithic VLA</text>
  <text x="155" y="88" fill="#64748B" font-size="10" text-anchor="middle">e.g., Physical Intelligence pi_0</text>

  <!-- Diagram -->
  <rect x="45" y="100" width="220" height="40" rx="6" fill="#1E293B" stroke="#64748B" stroke-width="1"/>
  <text x="155" y="125" fill="#94A3B8" font-size="11" font-weight="600" text-anchor="middle">One Big Model</text>

  <defs><marker id="arrowGray" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#64748B"/></marker></defs>
  <path d="M100 140 L100 155" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M155 140 L155 155" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M210 140 L210 155" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <text x="70" y="162" fill="#64748B" font-size="9">vision</text>
  <text x="140" y="162" fill="#64748B" font-size="9" text-anchor="middle">language</text>
  <text x="210" y="162" fill="#64748B" font-size="9" text-anchor="middle">action</text>

  <path d="M155 170 L155 200" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Joint actions box -->
  <rect x="60" y="205" width="190" height="32" rx="6" fill="#1E293B" stroke="#64748B" stroke-width="0.8"/>
  <text x="155" y="226" fill="#94A3B8" font-size="10" text-anchor="middle">Joint Actions</text>

  <text x="155" y="255" fill="#64748B" font-size="9" text-anchor="middle">No intermediate representation</text>

  <!-- Pros/Cons -->
  <text x="45" y="278" fill="#22C55E" font-size="9">+ Simple</text>
  <text x="163" y="278" fill="#EF4444" font-size="9">- Full retrain per robot</text>

  <!-- ===== COLUMN 2: Hierarchical (Direct) ===== -->
  <rect x="305" y="45" width="270" height="255" rx="8" fill="url(#directGrad)" stroke="#EAB308" stroke-width="1"/>
  <text x="440" y="70" fill="#EAB308" font-size="13" font-weight="700" text-anchor="middle">Hierarchical (Direct)</text>
  <text x="440" y="88" fill="#EAB308" fill-opacity="0.7" font-size="10" text-anchor="middle">e.g., Skild Brain</text>

  <!-- Top box -->
  <rect x="330" y="100" width="220" height="32" rx="6" fill="#1E293B" stroke="#EAB308" stroke-width="0.8"/>
  <text x="440" y="121" fill="#94A3B8" font-size="11" font-weight="600" text-anchor="middle">High-Level Policy</text>

  <path d="M440 132 L440 152" stroke="#EAB308" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <defs><marker id="arrowYellow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#EAB308"/></marker></defs>

  <!-- Command label -->
  <rect x="355" y="147" width="170" height="20" rx="4" fill="#EAB308" fill-opacity="0.15" stroke="#EAB308" stroke-width="0.5"/>
  <text x="440" y="161" fill="#EAB308" font-size="9" text-anchor="middle">explicit commands "move to X,Y"</text>

  <path d="M440 167 L440 185" stroke="#EAB308" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- Bottom box -->
  <rect x="330" y="185" width="220" height="32" rx="6" fill="#1E293B" stroke="#EAB308" stroke-width="0.8"/>
  <text x="440" y="206" fill="#94A3B8" font-size="11" font-weight="600" text-anchor="middle">Low-Level Controller</text>

  <path d="M440 217 L440 235" stroke="#EAB308" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <rect x="355" y="235" width="170" height="28" rx="6" fill="#1E293B" stroke="#EAB308" stroke-width="0.6"/>
  <text x="440" y="254" fill="#94A3B8" font-size="10" text-anchor="middle">Joint Actions</text>

  <!-- Pros/Cons -->
  <text x="330" y="278" fill="#22C55E" font-size="9">+ Modular</text>
  <text x="440" y="278" fill="#EF4444" font-size="9">- Tight coupling per robot</text>

  <!-- ===== COLUMN 3: Kynetic (Embedding Interface) ===== -->
  <rect x="590" y="45" width="270" height="255" rx="8" fill="url(#kyneticGrad)" stroke="#3B8BD4" stroke-width="1"/>
  <text x="725" y="70" fill="#3B8BD4" font-size="13" font-weight="700" text-anchor="middle">Kynetic</text>
  <text x="725" y="88" fill="#38BDF8" fill-opacity="0.7" font-size="10" text-anchor="middle">Embedding Interface</text>

  <!-- VLA box -->
  <rect x="615" y="100" width="220" height="28" rx="6" fill="#1E293B" stroke="#3B8BD4" stroke-width="0.8"/>
  <text x="725" y="119" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">VLA (high-level policy)</text>

  <defs><marker id="arrowBlue3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#3B8BD4"/></marker></defs>
  <path d="M725 128 L725 148" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#arrowBlue3)"/>

  <!-- z_g + mapping -->
  <rect x="660" y="148" width="130" height="20" rx="4" fill="#3B8BD4" fill-opacity="0.15" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="725" y="162" fill="#3B8BD4" font-size="9" text-anchor="middle">z_g — learned mapping</text>

  <path d="M725 168 L725 188" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#arrowBlue3)"/>

  <!-- Embedding manifold -->
  <ellipse cx="725" cy="208" rx="95" ry="25" fill="#3B8BD4" fill-opacity="0.15" stroke="#3B8BD4" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="725" y="212" fill="#3B8BD4" font-size="10" font-weight="700" text-anchor="middle">Skill Embedding Space</text>

  <path d="M725 233 L725 248" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrowOrange3)"/>

  <defs><marker id="arrowOrange3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#F97316"/></marker></defs>

  <!-- Controller -->
  <rect x="650" y="248" width="150" height="22" rx="6" fill="#1E293B" stroke="#F97316" stroke-width="0.8"/>
  <text x="725" y="264" fill="#94A3B8" font-size="10" text-anchor="middle">Controller + Decoder</text>

  <!-- Pros -->
  <text x="615" y="290" fill="#22C55E" font-size="9">+ New decoder per robot</text>
  <text x="615" y="304" fill="#22C55E" font-size="9">+ Skills compose</text>

  <!-- ===== DIFFERENTIATING TABLE ===== -->
  <line x1="20" y1="318" x2="860" y2="318" stroke="#334155" stroke-width="1"/>

  <!-- Table header -->
  <rect x="20" y="322" width="860" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="160" y="341" fill="#94A3B8" font-size="10" font-weight="700" text-anchor="middle">Interface</text>
  <text x="440" y="341" fill="#94A3B8" font-size="10" font-weight="700" text-anchor="middle">Transfer</text>
  <text x="725" y="341" fill="#94A3B8" font-size="10" font-weight="700" text-anchor="middle">Composition</text>

  <!-- Row: Monolithic -->
  <rect x="20" y="354" width="270" height="38" rx="0" fill="#64748B" fill-opacity="0.05"/>
  <text x="155" y="376" fill="#64748B" font-size="11" text-anchor="middle">None</text>

  <rect x="305" y="354" width="270" height="38" rx="0" fill="#EAB308" fill-opacity="0.05"/>
  <text x="440" y="376" fill="#EAB308" font-size="11" text-anchor="middle">Explicit commands</text>

  <rect x="590" y="354" width="270" height="38" rx="0" fill="#3B8BD4" fill-opacity="0.05"/>
  <text x="725" y="376" fill="#3B8BD4" font-size="11" text-anchor="middle">Learned embeddings</text>

  <!-- Row: Transfer -->
  <text x="155" y="418" fill="#64748B" font-size="11" text-anchor="middle">Full retrain</text>
  <text x="440" y="418" fill="#EAB308" font-size="11" text-anchor="middle">Retrain high-level</text>
  <text x="725" y="418" fill="#3B8BD4" font-size="11" text-anchor="middle">New decoder head only</text>

  <!-- Row: Composition -->
  <text x="155" y="450" fill="#64748B" font-size="11" text-anchor="middle">Implicit</text>
  <text x="440" y="450" fill="#EAB308" font-size="11" text-anchor="middle">Sequential</text>
  <text x="725" y="450" fill="#3B8BD4" font-size="11" text-anchor="middle">Latent blending</text>

  <!-- Column headers at bottom -->
  <text x="155" y="480" fill="#64748B" font-size="10" font-weight="600" text-anchor="middle">Monolithic VLA</text>
  <text x="440" y="480" fill="#EAB308" font-size="10" font-weight="600" text-anchor="middle">Hierarchical (Direct)</text>
  <text x="725" y="480" fill="#3B8BD4" font-size="10" font-weight="600" text-anchor="middle">Kynetic (Embedding Interface)</text>
</svg>
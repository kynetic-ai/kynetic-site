<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="100%" style="max-width:880px; font-family: Inter, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="manifold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B8BD4" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#3B8BD4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="url(#bg)"/>

  <!-- ===== LAYER 1: Task Reasoning ===== -->
  <rect x="20" y="20" width="840" height="100" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="40" y="48" fill="#38BDF8" font-size="14" font-weight="700">TASK REASONING — GR00T N1.7 VLA</text>
  <text x="40" y="68" fill="#94A3B8" font-size="12">System 2 (Cosmos-Reason2-2B VLM) → System 1 (DiT flow matching) → backbone_features → z_g_pre [2048]</text>
  <text x="40" y="88" fill="#94A3B8" font-size="11">→ Mapping MLP (2048→1024→512→128) → <tspan fill="#38BDF8" font-weight="700">z_g [128]</tspan></text>

  <!-- Input icons -->
  <rect x="40" y="96" width="44" height="16" rx="4" fill="#334155"/>
  <text x="62" y="108" fill="#94A3B8" font-size="10" text-anchor="middle">cameras + text</text>

  <!-- 10Hz annotation -->
  <text x="350" y="18" fill="#64748B" font-size="10">10 Hz</text>
  <line x1="350" y1="24" x2="350" y2="32" stroke="#64748B" stroke-width="1"/>

  <!-- Arrow from Layer 1 to Layer 2 -->
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3B8BD4"/></marker></defs>
  <path d="M440 120 L440 145" stroke="#3B8BD4" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="4,2"/>

  <!-- ===== LAYER 2: Skill Embedding Space ===== -->
  <ellipse cx="440" cy="220" rx="380" ry="55" fill="url(#manifold)" stroke="#3B8BD4" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="440" y="210" fill="#3B8BD4" font-size="15" font-weight="700" text-anchor="middle" filter="url(#glow)">SKILL EMBEDDING SPACE</text>
  <text x="440" y="230" fill="#64748B" font-size="11" text-anchor="middle">z_s in R^128 — embodiment-invariant latent manifold</text>

  <text x="440" y="255" fill="#38BDF8" font-size="10" text-anchor="middle" font-style="italic">everything above is shared across embodiments</text>

  <!-- ===== EMBODIMENT BARRIER ===== -->
  <line x1="40" y1="275" x2="840" y2="275" stroke="#F97316" stroke-width="1.5" stroke-dasharray="12,6"/>
  <text x="440" y="295" fill="#F97316" font-size="11" font-weight="600" text-anchor="middle">EMBODIMENT BARRIER — everything below is per-robot</text>

  <!-- Arrow from manifold to controller -->
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#F97316"/></marker></defs>
  <path d="M440 255 L440 305" stroke="#F97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ===== LAYER 3: Low-Level Controller ===== -->
  <!-- Shared core -->
  <rect x="360" y="310" width="160" height="36" rx="6" fill="url(#controllerGrad)" stroke="#F97316" stroke-width="1"/>
  <text x="440" y="332" fill="#F97316" font-size="12" font-weight="700" text-anchor="middle">ASE Controller (shared)</text>

  <!-- 50Hz annotation -->
  <text x="520" y="334" fill="#64748B" font-size="10">50 Hz</text>

  <!-- Split arrows -->
  <path d="M440 346 L440 370 L200 370 L200 385" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrowOrange)" fill="none"/>
  <path d="M440 346 L440 370 L680 370 L680 385" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrowOrange)" fill="none"/>

  <!-- G1 Decoder -->
  <rect x="120" y="390" width="160" height="60" rx="6" fill="#1E293B" stroke="#F97316" stroke-width="0.8"/>
  <text x="200" y="413" fill="#F97316" font-size="12" font-weight="700" text-anchor="middle">Unitree G1 Decoder</text>
  <text x="200" y="432" fill="#94A3B8" font-size="10" text-anchor="middle">Humanoid — 23 DoF</text>
  <text x="200" y="446" fill="#64748B" font-size="9" text-anchor="middle">joint torque targets</text>

  <!-- GR1-T2 Decoder -->
  <rect x="600" y="390" width="160" height="60" rx="6" fill="#1E293B" stroke="#F97316" stroke-width="0.8"/>
  <text x="680" y="413" fill="#F97316" font-size="12" font-weight="700" text-anchor="middle">Fourier GR1-T2 Decoder</text>
  <text x="680" y="432" fill="#94A3B8" font-size="10" text-anchor="middle">Humanoid — 19 DoF</text>
  <text x="680" y="446" fill="#64748B" font-size="9" text-anchor="middle">joint torque targets</text>

  <!-- Layer labels - right side -->
  <text x="868" y="70" fill="#38BDF8" font-size="10" text-anchor="end">high-level</text>
  <text x="868" y="230" fill="#3B8BD4" font-size="10" text-anchor="end">skill space</text>
  <text x="868" y="420" fill="#F97316" font-size="10" text-anchor="end">low-level</text>
</svg>